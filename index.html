
<!DOCTYPE html>
<html lang="pt-BR" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jornada do Mentorado | Império Previdenciário</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              gray: {
                850: '#1f2937',
              }
            }
          }
        }
      }
    </script>
    <script type="importmap">
    {
      "imports": {
        "react/": "https://aistudiocdn.com/react@^19.2.0/",
        "react": "https://aistudiocdn.com/react@^19.2.0",
        "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
        "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
        "vite": "https://aistudiocdn.com/vite@^7.2.4",
        "@vitejs/plugin-react": "https://aistudiocdn.com/@vitejs/plugin-react@^5.1.1"
      }
    }
    </script>
    <!-- Bibliotecas para processamento de arquivos -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <!-- Biblioteca para renderização de Markdown (Tabelas, Negrito, etc) -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <script>
        // Configuração do Worker do PDF.js
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <style>
      /* Estilos básicos de impressão para o app (caso alguém tente Ctrl+P) */
      @media print {
        nav, header, aside, .sidebar, .header, .chat-widget, button, .no-print {
            display: none !important;
        }
        body {
            background: white !important;
            color: black !important;
        }
      }

      /* Estilos para o conteúdo Markdown renderizado na tela */
      .markdown-content table {
        width: 100%;
        border-collapse: collapse;
        margin: 1.5rem 0;
        font-size: 0.9rem;
      }
      .markdown-content th {
        background-color: #374151; /* gray-700 */
        color: #FBBF24; /* yellow-400 */
        font-weight: bold;
        padding: 0.75rem;
        text-align: left;
        border: 1px solid #4B5563;
      }
      .markdown-content td {
        padding: 0.75rem;
        border: 1px solid #4B5563; /* gray-600 */
        color: #D1D5DB; /* gray-300 */
      }
      /* Dark mode override via CSS var or class check handled by JS/Tailwind usually, but for specific markdown content: */
      html.dark .markdown-content tr:nth-child(even) {
        background-color: rgba(55, 65, 81, 0.3);
      }
      html:not(.dark) .markdown-content th {
        background-color: #f3f4f6;
        color: #1f2937;
        border: 1px solid #e5e7eb;
      }
      html:not(.dark) .markdown-content td {
        border: 1px solid #e5e7eb;
        color: #374151;
      }
      html:not(.dark) .markdown-content tr:nth-child(even) {
        background-color: #f9fafb;
      }
      html:not(.dark) .markdown-content h1, 
      html:not(.dark) .markdown-content h2, 
      html:not(.dark) .markdown-content h3 {
        color: #111827;
      }
      html:not(.dark) .markdown-content strong {
        color: #000;
      }

      .markdown-content h1 {
        font-size: 1.875rem;
        line-height: 2.25rem;
        font-weight: 700;
        color: #FBBF24;
        margin-top: 2rem;
        margin-bottom: 1rem;
      }
      .markdown-content h2 {
        font-size: 1.5rem;
        line-height: 2rem;
        font-weight: 700;
        color: #ffffff;
        margin-top: 1.5rem;
        margin-bottom: 0.75rem;
      }
      .markdown-content h3 {
        font-size: 1.25rem;
        line-height: 1.75rem;
        font-weight: 600;
        color: #E5E7EB;
        margin-top: 1.25rem;
        margin-bottom: 0.5rem;
      }
      .markdown-content ul {
        list-style-type: disc;
        padding-left: 1.5rem;
        margin-bottom: 1rem;
      }
      .markdown-content ol {
        list-style-type: decimal;
        padding-left: 1.5rem;
        margin-bottom: 1rem;
      }
      .markdown-content p {
        margin-bottom: 1rem;
        line-height: 1.6;
      }
      .markdown-content strong {
        color: white;
        font-weight: bold;
      }
    </style>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-200">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
